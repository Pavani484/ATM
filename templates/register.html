<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 320px;">
    <h3 class="text-center mb-3">🆕 Create Account</h3>

    <form method="post">
        <!-- ✅ Email -->
        <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>

        <!-- ✅ PIN -->
        <input class="form-control mb-2" name="pin" type="number" placeholder="PIN" required>

        <!-- ✅ Balance -->
        <input class="form-control mb-2" name="balance" type="number" placeholder="Initial Balance" required>

        <button class="btn btn-primary w-100">Register</button>
    </form>

    <a href="/" class="btn btn-secondary mt-2 w-100">Back</a>
</div>

</body>
</html>
