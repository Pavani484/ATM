<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center mb-3">🆕 Create Account</h3>

    <form method="post">
        <input class="form-control mb-2" name="username" placeholder="Username">
        <input class="form-control mb-2" name="pin" placeholder="PIN">
        <input class="form-control mb-2" name="balance" placeholder="Initial Balance">

        <button class="btn btn-primary w-100">Register</button>
    </form>

    <a href="/" class="btn btn-secondary mt-2 w-100">Back</a>
</div>

</body>
</html>
