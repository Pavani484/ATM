<!DOCTYPE html>
<html>
<head>
    <title>Forgot PIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">

    <h4 class="text-center mb-3">🔑 Forgot PIN</h4>

    {% if message %}
        <div class="alert alert-warning text-center">
            {{ message }}
        </div>
    {% endif %}

    <form method="post">
        <input class="form-control mb-3" name="email" type="email" placeholder="Enter your email" required>

        <button class="btn btn-primary w-100">Send OTP</button>
    </form>

    <p class="text-center mt-3">
        <a href="/">Back to Login</a>
    </p>

</div>

</body>
</html>
