<!DOCTYPE html>
<html>
<head>
    <title>ATM Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center mb-3">🔐 Login</h3>

    {% if message %}
        <div class="alert alert-danger text-center">
            {{ message }}
        </div>
    {% endif %}

    <form method="post">

        <input class="form-control mb-3" name="email" type="email" placeholder="Enter Email" required>

        <input class="form-control mb-3" name="pin" type="password" placeholder="Enter PIN" required>

        <button class="btn btn-success w-100">Login</button>

    </form>

    <p class="text-center mt-3">
        <a href="/forgot">Forgot PIN?</a>
    </p>

    <p class="text-center mt-2">Don't have an account?</p>
    <a href="/register" class="btn btn-primary w-100">Register</a>

</div>

</body>
</html>
