<!DOCTYPE html>
<html>
<head>
    <title>ATM Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center mb-3">🔐 Login</h3>

    <form method="post">
        <!-- ✅ added required -->
        <input class="form-control mb-2" name="username" placeholder="Username" required>

        <!-- ✅ added required + minlength -->
        <input class="form-control mb-2" name="pin" type="password" placeholder="PIN" required minlength="4">

        <button class="btn btn-success w-100">Login</button>
    </form>

    <p class="text-center mt-2">No account?</p>
    <a href="/register" class="btn btn-primary w-100">Register</a>
</div>

</body>
</html>
