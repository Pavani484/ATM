<!DOCTYPE html>
<html>
<head>
    <title>Bank Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-3 shadow">
    <span class="navbar-brand fw-bold">🏦 MyBank</span>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <!-- 💰 BALANCE CARD -->
    <div class="card text-white bg-success mb-4 shadow-lg rounded-4">
        <div class="card-body text-center">
            <h5>Available Balance</h5>
            <h1 class="fw-bold">₹ {{ balance }}</h1>
        </div>
    </div>

    <!-- ⚡ ACTIONS -->
    <div class="row g-4">

        <!-- Deposit -->
        <div class="col-md-6">
            <div class="card shadow rounded-4">
                <div class="card-body">
                    <h5 class="mb-3">💰 Deposit Money</h5>
                    <form method="post">
                        <input type="number" class="form-control mb-3" name="amount" placeholder="Enter amount" required>
                        <button class="btn btn-success w-100" name="action" value="deposit">
                            Deposit
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Withdraw -->
        <div class="col-md-6">
            <div class="card shadow rounded-4">
                <div class="card-body">
                    <h5 class="mb-3">🏧 Withdraw Money</h5>
                    <form method="post">
                        <input type="number" class="form-control mb-3" name="amount" placeholder="Enter amount" required>
                        <button class="btn btn-danger w-100" name="action" value="withdraw">
                            Withdraw
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- 📜 TRANSACTION HISTORY -->
    <div class="card mt-4 shadow rounded-4">
        <div class="card-body">
            <h5 class="mb-3">📜 Transaction History</h5>

            {% if history %}
                <ul class="list-group">
                    {% for h in history %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>{{ h[0] }}</span>
                            <small class="text-muted">{{ h[1] }}</small>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No transactions yet</p>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
