<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <!-- 🔝 Header -->
    <div class="d-flex justify-content-between align-items-center">
        <h3>💳 Welcome</h3>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- 💰 Balance -->
    <div class="card p-3 mt-3 bg-secondary">
        <h4>Balance: ₹ {{ balance }}</h4>
    </div>

    <!-- 💸 Deposit / Withdraw -->
    <div class="card p-3 mt-3 bg-light text-dark">
        <form method="post">
            <input
                class="form-control mb-2"
                name="amount"
                type="number"
                placeholder="Enter amount"
                required
            >

            <div class="d-flex gap-2">
                <button name="action" value="deposit" class="btn btn-success w-100">
                    Deposit
                </button>
                <button name="action" value="withdraw" class="btn btn-danger w-100">
                    Withdraw
                </button>
            </div>
        </form>
    </div>

    <!-- 📜 Transaction History -->
    <div class="card p-3 mt-3 bg-secondary">
        <h5>📜 Transaction History</h5>

        <ul class="list-group">

            {% if history %}
                {% for h in history %}
                <li class="list-group-item">
                    <strong>{{ h[0] }}</strong><br>
                    <small>{{ h[1] }}</small>
                </li>
                {% endfor %}
            {% else %}
                <li class="list-group-item text-center">
                    No transactions yet
                </li>
            {% endif %}

        </ul>
    </div>

</div>

</body>
</html>
