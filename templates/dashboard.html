<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="d-flex justify-content-between">
        <h3>💳 Welcome</h3>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="card p-3 mt-3 bg-secondary">
        <h4>Balance: ₹ {{ balance }}</h4>
    </div>

    <div class="card p-3 mt-3 bg-light text-dark">
        <form method="post">
            <!-- ✅ added type="number" -->
            <input class="form-control mb-2" name="amount" type="number" placeholder="Enter amount" required>

            <button name="action" value="deposit" class="btn btn-success">Deposit</button>
            <button name="action" value="withdraw" class="btn btn-danger">Withdraw</button>
        </form>
    </div>

    <div class="card p-3 mt-3 bg-secondary">
        <h5>📜 Transaction History</h5>
        <ul class="list-group">

            <!-- ✅ handle empty history -->
            {% if history %}
                {% for h in history %}
                <li class="list-group-item">
                    {{ h[0] }} <br>
                    <!-- ✅ show time -->
                    <small>{{ h[1] }}</small>
                </li>
                {% endfor %}
            {% else %}
                <li class="list-group-item">No transactions yet</li>
            {% endif %}

        </ul>
    </div>

</div>

</body>
</html>
