<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">

    <h4 class="text-center mb-3">🔐 Verify OTP</h4>

    {% if message %}
        <div class="alert alert-danger text-center">
            {{ message }}
        </div>
    {% endif %}

    <form method="post">

        <input type="number" name="otp" class="form-control mb-3 text-center" placeholder="Enter OTP" required>

        <button class="btn btn-success w-100">Verify</button>

    </form>

    <p class="text-center mt-3 text-muted">
        OTP valid for 2 minutes
    </p>

    <p class="text-center mt-2">
        <a href="/">Back to Login</a>
    </p>

</div>

</body>
</html>
